<mat-toolbar class="toolbar">
    <span>Task CRUD App</span>
    <button mat-raised-button color="accent" routerLink="/tasks/add">
        <mat-icon>add</mat-icon> Add New Task
    </button>
    <button mat-raised-button color="primary" (click)="logout()">Logout🚪</button>
    
</mat-toolbar>


<!-- Filter -->
<mat-form-field appearance="outline" style="width: 100%;">
    <mat-label>Search Tasks</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="ex: High" #input>
    <mat-icon matSuffix>search</mat-icon>
</mat-form-field>

<div style="margin-bottom: 15px;">
  <span>Filter By Priority: </span>
  <button mat-button color="primary" (click)="updateURLFilter(null)">All</button>
  <button mat-button color="warn" (click)="updateURLFilter('high')">High</button>
  <button mat-button color="accent" (click)="updateURLFilter('low')">Low</button>
</div>

<table mat-table [dataSource]="dataSource" matSort>

    <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Task Name</th>
        <td mat-cell *matCellDef="let task">{{task.title}}</td>
    </ng-container>

    <ng-container matColumnDef="priority">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Priority</th>
        <td mat-cell *matCellDef="let task">{{task.priority | titlecase}}</td>
    </ng-container>

    <ng-container matColumnDef="dueDate">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Date</th>
        <td mat-cell *matCellDef="let task">{{task.dueDate | date}}</td>
    </ng-container>

    <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let task">

            <button mat-icon-button color="primary" [routerLink]="['/tasks/edit', task.id]">
                <mat-icon>edit</mat-icon>
            </button>

            <button mat-icon-button color="warn" (click)="deleteTask(task.id)">
                <mat-icon>delete</mat-icon>
            </button>
        </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

</table>

<!-- Put this paginator code below the table -->
<mat-paginator [pageSizeOptions]="[5, 10, 20]" showFirstLastButtons aria-label="select page of tasks">
</mat-paginator>
